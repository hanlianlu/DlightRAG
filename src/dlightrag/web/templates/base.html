<!DOCTYPE html>
<html lang="en" data-theme="system" data-color-mode="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark light">
    <title>DlightRAG</title>
    <meta name="htmx-config" content='{"allowEval": false, "allowScriptTags": false}'>
    <script>
        (function () {
            var root = document.documentElement;
            var storageKey = 'dlightrag-theme';
            var preference = 'system';
            var storedPreference = null;

            try {
                storedPreference = window.localStorage.getItem(storageKey);
            } catch (_error) {
                storedPreference = null;
            }

            if (
                storedPreference === 'system' ||
                storedPreference === 'light' ||
                storedPreference === 'dark'
            ) {
                preference = storedPreference;
            } else if (storedPreference !== null) {
                try {
                    window.localStorage.removeItem(storageKey);
                } catch (_error) {
                    // Ignore storage write errors and keep safe defaults.
                }
            }

            var prefersDark = true;
            try {
                if (typeof window.matchMedia === 'function') {
                    prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                }
            } catch (_error) {
                prefersDark = true;
            }

            var colorMode =
                preference === 'system'
                    ? (prefersDark ? 'dark' : 'light')
                    : preference;

            root.setAttribute('data-theme', preference);
            root.setAttribute('data-color-mode', colorMode);
            root.style.colorScheme = colorMode;
        })();
    </script>
    <link rel="stylesheet" href="/static/generated/style.css?v={{ static_version() }}">

    <!-- Pygments code highlighting theme -->
    <link rel="stylesheet" href="/static/pygments.css?v={{ static_version() }}">
</head>
<body>
    {% block content %}{% endblock %}
    <script src="/static/vendor/htmx.min.js?v={{ static_version() }}"></script>
    <script>
        window.__DLIGHTRAG_STATIC_VERSION__ = "{{ static_version() }}";
    </script>
    <script type="module" src="/static/generated/js/main.js?v={{ static_version() }}"></script>
</body>
</html>
