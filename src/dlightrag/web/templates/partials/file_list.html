<div class="upload-zone" onclick="document.getElementById('file-input').click()">
    Drop files here or click to upload
    <form id="upload-form"
          hx-post="/web/files/upload"
          hx-target="#panel-content"
          hx-swap="innerHTML"
          hx-encoding="multipart/form-data"
          hx-indicator="#upload-spinner"
          style="display:none">
        <input type="file" id="file-input" name="files" multiple
               onchange="htmx.trigger('#upload-form', 'submit')">
    </form>
</div>
<div id="upload-spinner" class="file-status htmx-indicator">Ingesting... will update when finished.</div>

{% if files %}
{% for file in files %}
<div class="file-item">
    <span class="file-name" title="{{ file.file_path }}">{{ file.file_name }}</span>
    <button class="file-delete"
            hx-delete="/web/files"
            hx-vals='{"file_path": {{ file.file_path | tojson }}}'
            hx-target="#panel-content"
            hx-swap="innerHTML"
            hx-confirm="Delete {{ file.file_name }}?">
        &#10005;
    </button>
</div>
{% endfor %}
{% else %}
<div class="empty-state" style="padding:40px 0;font-size:13px;">
    No files ingested in workspace "{{ workspace }}".
</div>
{% endif %}
