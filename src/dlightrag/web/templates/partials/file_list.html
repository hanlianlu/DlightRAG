{% if ingest_busy %}
    {% include "partials/ingest_progress.html" %}
{% else %}
<div class="upload-zone" id="upload-zone">
    <div class="upload-buttons">
        <button type="button" class="upload-btn" data-action="upload-folder" aria-label="Upload folder">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
            Upload Folder
        </button>
        <button type="button" class="upload-btn" data-action="upload-file" aria-label="Upload files">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Upload Files
        </button>
    </div>
    <form id="upload-form"
          hx-post="/web/files/upload"
          hx-target="#panel-content"
          hx-swap="innerHTML"
          hx-encoding="multipart/form-data"
          hx-indicator="#upload-spinner"
          class="visually-hidden">
        <input type="hidden" name="workspace" value="{{ workspace }}">
        <input type="file" id="file-input" name="files" multiple>
    </form>
</div>
<div id="upload-spinner" class="file-status htmx-indicator">Uploading...</div>
{% endif %}

{% if files %}
{% for file in files %}
<div class="file-item">
    <span class="file-name" title="{{ file.file_path }}">{{ file.file_name }}</span>
    <button class="file-delete"
            hx-delete="/web/files"
            hx-vals='{"file_path": {{ file.file_path | tojson }}}'
            hx-target="#panel-content"
            hx-swap="innerHTML"
            hx-confirm="Delete {{ file.file_name }}?">
        &#10005;
    </button>
</div>
{% endfor %}
{% elif not ingest_busy %}
<div class="empty-state file-empty-state">
    No files ingested in workspace "{{ workspace }}".
</div>
{% endif %}
