<!-- Workspace create form -->
<form class="workspace-create-form"
      hx-post="/web/workspaces/create"
      hx-target="#panel-content"
      hx-swap="innerHTML">
    <input class="workspace-create-input"
           type="text"
           name="workspace_name"
           placeholder="New workspace name">
    <button class="workspace-create-submit" type="submit">Create</button>
</form>

<!-- Workspace list -->
{% for ws in workspaces %}
<div class="workspace-check-item" data-ws="{{ ws }}">
    <div class="ws-checkbox"></div>
    <span class="ws-check-name">{{ ws }}</span>
    {% if ws != current_workspace %}
    <button class="workspace-delete-open"
            type="button"
            data-action="workspace-delete-open"
            title="Delete workspace">
        &#10005;
    </button>
    <div class="ws-delete-confirm" aria-hidden="true">
        <form class="workspace-delete-card"
              hx-post="/web/workspaces/delete"
              hx-target="#panel-content"
              hx-swap="innerHTML">
            <input type="hidden" name="workspace_name" value="{{ ws }}">
            <p class="workspace-delete-copy">
                Type <strong>{{ ws }}</strong> to confirm deletion:
            </p>
            <input class="workspace-delete-input"
                   type="text"
                   name="confirm_name"
                   placeholder="{{ ws }}">
            <div class="workspace-delete-actions">
                <button class="workspace-delete-cancel"
                        type="button"
                        data-action="workspace-delete-cancel">
                    Cancel
                </button>
                <button class="workspace-delete-danger" type="submit">Delete</button>
            </div>
        </form>
    </div>
    {% endif %}
</div>
{% endfor %}
