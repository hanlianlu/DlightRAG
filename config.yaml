#
# DlightRAG — default application configuration
# Secrets (API keys, passwords) go in .env (see .env.example).
#
# Priority: env vars > .env > config.yaml > code defaults

# ─────────────────────────────────────────────────────────────────
# Models
# ─────────────────────────────────────────────────────────────────
# LLM roles follow LightRAG role names exactly:
#   extract — entity/relationship extraction and ingest-time semantic projection
#   keyword — LightRAG retrieval keyword extraction
#   query   — answer generation and query planning
#   vlm     — image/table/equation analysis

llm:
  default:
    provider: openai
    model: google/gemini-3.5-flash
    base_url: https://openrouter.ai/api/v1
    temperature: 0.5
    timeout: 120.0
  roles:
    extract:
      provider: openai
      model: deepseek-v4-flash
      base_url: https://api.deepseek.com
      temperature: 0.0
      timeout: 120.0
      model_kwargs:
        thinking:
          type: disabled
    keyword:
      provider: openai
      model: deepseek-v4-flash
      base_url: https://api.deepseek.com
      temperature: 0.0
      timeout: 120.0
      model_kwargs:
        thinking:
          type: disabled
  # roles:
  #   query:
  #     provider: openai
  #     model: gpt-5.2
  #   vlm:
  #     provider: gemini
  #     model: google/gemini-3.5-flash

embedding:
  provider: voyage
  model: voyage-multimodal-3.5
  base_url: https://api.voyageai.com/v1
  dim: 1024
  max_token_size: 8192
  asymmetric: auto
  startup_probe: true

rerank:
  enabled: true
  # ── Strategy ──────────────────────────────────────────────────
  # chat_llm_reranker  — VLM/LLM listwise scoring (multimodal). Uses
  #   llm.default provider+model unless overridden below.
  # jina_reranker      — Jina AI rerank API (supports image+text docs).
  #   Requires: base_url, api_key, model
  # aliyun_reranker    — Aliyun DashScope rerank (text-only; image chunks
  #   are sent as text fallback). Requires: api_key
  # local_reranker     — Self-hosted rerank endpoint (e.g., vLLM/TGI).
  #   Requires: base_url, model
  # azure_cohere       — Azure AI Cohere rerank (text-only).
  #   Requires: base_url, api_key, model
  # ───────────────────────────────────────────────────────────────
  strategy: chat_llm_reranker
  # provider: openai          # LLM provider override for chat_llm_reranker
  # model: gpt-5.2            # Model override (all strategies)
  # api_key:                  # API key (jina/aliyun/azure_cohere)
  # base_url:                 # Endpoint URL (jina/local/azure_cohere)
  score_threshold: 0.5
  max_concurrency: 4
  batch_size: 7
  # temperature:              # LLM sampling temperature (chat_llm_reranker)
  # Rerank happens before answer packing, so it has its own request budget.
  # Values are compressed binary bytes; data URI transport expands over the wire.
  image_max_bytes: 1500000
  image_max_total_bytes: 8000000
  image_max_px: 1280
  image_min_px: 768
  image_quality: 86
  image_min_quality: 76

citations:
  highlights:
    enabled: false
    timeout: 5.0
    max_concurrency: 4
    max_input_chars: 4096
    cache_size: 500

answer:
  # /answer over-fetches chunk/visual candidates, then packs fewer chunks into
  # the final LLM prompt. This does not change LightRAG top_k, which controls
  # KG entity/relationship breadth.
  candidate_top_k: 60
  context_top_k: 30
  max_images: 6
  image_max_bytes: 3000000
  image_max_total_bytes: 24000000
  image_max_px: 1536
  image_min_px: 1024
  image_quality: 89
  image_min_quality: 79

query_images:
  semantic_enhancement: true
  max_described_images: 3
  session_max_images: 50
  session_max_sessions: 100
  session_ttl_seconds: 3600

visual_assets:
  thumb_max_px: 300
  thumb_cache_size: 256

# ─────────────────────────────────────────────────────────────────
# Unified LightRAG Main Ingestion
# ─────────────────────────────────────────────────────────────────

working_dir: ./dlightrag_storage
parser:
  rules: "docx:native-iteP,*:mineru-iteP"
  chunk_options: {}

extraction:
  use_json: true
  language: English
  # YAML file name under PROMPT_DIR/entity_type (default ./prompts/entity_type).
  # Must be a file name such as domain-entities.yaml, not a path.
  entity_type_prompt_file:

parser_sidecars:
  vlm:
    enabled: true
    max_image_bytes: 5242880
    surrounding_leading_max_tokens: 128
    surrounding_trailing_max_tokens: 128
  mineru:
    api_mode: local
    local_endpoint: http://127.0.0.1:8210
    local_backend: hybrid-auto-engine
    local_parse_method: auto
    local_image_analysis: true
    auxiliary_block_policy: conservative
    enable_table: true
    enable_formula: true
    poll_interval_seconds: 2
    max_polls: 180
    language: ch
    # page_ranges:
    # api_token:
    # official_endpoint: https://mineru.net
    # model_version: vlm
    # is_ocr: false

metadata:
  allow_ad_hoc_json: true
  default_ingest_policy: validate
  fields: {}
  # Declare custom user metadata fields here only when they should become
  # filterable. Undeclared metadata is still stored in metadata_json when
  # allow_ad_hoc_json is true, but it is not promoted to declared filters.
  # String exact filters default to casefold_trim for stable human-entered
  # matching; set normalizer: identity only for case-sensitive identifiers.
  # Example:
  # fields:
  #   department:
  #     type: string
  #     filter_ops: ["exact"]

# Chunking and LightRAG query defaults.
chunk_p_token_size: 1024

# ─────────────────────────────────────────────────────────────────
# PostgreSQL 18 Storage
# ─────────────────────────────────────────────────────────────────

workspace: default
runtime_role: ingest   # ingest | admin | query
read_after_write_mode: eventual  # eventual | wait_for_replay
read_after_write_timeout: 15.0
postgres_required_major: 18

# Primary endpoint fields. Query workers use postgres_replica_* when
# runtime_role=query; omitted replica fields fall back to the primary values
# for local/dev setups.
# postgres_host: localhost
# postgres_port: 5432
# postgres_user: dlightrag
# postgres_password: dlightrag
# postgres_database: dlightrag
# postgres_replica_host: replica.internal
# postgres_replica_port: 5432
# postgres_replica_user: dlightrag_reader
# postgres_replica_password: ""
# postgres_replica_database: dlightrag
# SSL settings are shared by primary and replica and are bridged to both
# LightRAG and DlightRAG-owned PostgreSQL connections.
# postgres_ssl_mode: require  # disable | allow | prefer | require | verify-ca | verify-full
# postgres_ssl_cert:
# postgres_ssl_key:
# postgres_ssl_root_cert:
# postgres_ssl_crl:

vector_storage: PGVectorStorage
graph_storage: PGGraphStorage
kv_storage: PGKVStorage
doc_status_storage: PGDocStatusStorage

# LightRAG derives VECTOR/HALFVEC from POSTGRES_VECTOR_INDEX_TYPE.
# HNSW uses VECTOR(dim); HNSW_HALFVEC is explicit opt-in.
pg_vector_index_type: HNSW
pg_hnsw_m: 32
pg_hnsw_ef_construction: 256
pg_hnsw_ef_search: 256
postgres_lightrag_pool_max_size: 16
postgres_pool_min_size: 2
postgres_pool_max_size: 10
postgres_session_settings: {}
postgres_statement_cache_size:
postgres_connection_retries: 10
postgres_connection_retry_backoff: 3.0
postgres_connection_retry_backoff_max: 30.0
postgres_pool_close_timeout: 5.0

# ─────────────────────────────────────────────────────────────────
# Ingestion Performance
# ─────────────────────────────────────────────────────────────────

# LightRAG staged pipeline controls. Defaults follow LightRAG's native
# batch pipeline while keeping the DlightRAG config surface explicit.
max_parallel_insert: 3
max_parallel_parse_native: 5
max_parallel_parse_mineru: 2
max_parallel_analyze: 5
queue_size_parse: 20
queue_size_analyze: 32
queue_size_insert: 4

# Shared LLM concurrency cap for LightRAG role queues and DlightRAG-owned
# planner/answer/query-image VLM calls.
max_async: 8
embedding_func_max_async: 16
embedding_batch_num: 10
embedding_request_timeout: 120

# ─────────────────────────────────────────────────────────────────
# Query
# ─────────────────────────────────────────────────────────────────

top_k: 60        # LightRAG KG entity/relationship breadth.
chunk_top_k: 30  # Direct /retrieve chunk breadth; /answer uses answer.candidate_top_k.
bm25_enabled: true
bm25_top_k: 40
bm25_profiles:
  - name: zh
    text_config: public.jiebacfg
    languages: ["zh"]
  - name: en
    text_config: english
    languages: ["en"]
  - name: de
    text_config: german
    languages: ["de"]
  - name: sv
    text_config: swedish
    languages: ["sv"]
  - name: es
    text_config: spanish
    languages: ["es"]
  - name: fr
    text_config: french
    languages: ["fr"]
  - name: simple
    text_config: simple
    fallback: true
bm25_k1: 1.2
bm25_b: 0.75
rrf_k: 60
direct_visual_top_k: 20
metadata_filter_exact_vector_threshold: 8192
max_conversation_turns: 25
max_conversation_tokens: 65536

# ─────────────────────────────────────────────────────────────────
# Knowledge Graph
# ─────────────────────────────────────────────────────────────────

kg_entity_types:
  - Product
  - Component
  - Technology
  - Design
  - Genre
  - Organization
  - Standard
  - Biography
  - Location
  - Event

