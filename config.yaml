#
# DlightRAG — curated application configuration
#
# This file is intentionally small. Keep high-signal product and deployment
# choices here; keep secrets in .env; keep rare tuning in docs/configuration.md
# or pass it through environment variables when a deployment needs it.
#
# Priority: env vars > .env > config.yaml > code defaults

# ─────────────────────────────────────────────────────────────────
# Models
# ─────────────────────────────────────────────────────────────────
# `provider` selects the API protocol / SDK family — not the vendor brand.
# It accepts exactly three values (case-insensitive):
#   openai     Any OpenAI-compatible endpoint. Choose the vendor with base_url:
#              OpenAI, DeepSeek, OpenRouter, Azure OpenAI, MiniMax, Qwen, Zhipu,
#              local vLLM / Ollama, … all use provider: openai.
#   anthropic  Anthropic Claude, native SDK (leave base_url unset).
#   gemini     Google Gemini, native SDK (leave base_url unset).
# There is no provider: deepseek / openrouter / azure — those are provider:
# openai plus the matching base_url (an unknown value is rejected at load time).
#
# LLM roles follow LightRAG role names exactly:
#   extract — entity/relationship extraction and ingest-time semantic projection
#   keyword — LightRAG retrieval keyword extraction and query planning
#   query   — answer generation
#   vlm     — image/table/equation analysis

llm:
  default:
    provider: openai
    model: z-ai/glm-5.2
    base_url: https://openrouter.ai/api/v1
    structured_output: json_schema
    temperature: 0.4
    timeout: 120.0
    model_kwargs:
      thinking:
        type: disabled
  roles:
    extract:
      provider: openai
      model: deepseek-v4-flash
      base_url: https://api.deepseek.com
      structured_output: json_object
      temperature: 0.0
      timeout: 120.0
      model_kwargs:
        thinking:
          type: disabled
    keyword:
      provider: openai
      model: deepseek-v4-flash
      base_url: https://api.deepseek.com
      structured_output: json_object
      temperature: 0.0
      timeout: 120.0
      model_kwargs:
        thinking:
          type: disabled
    query:
      provider: openai
      model: qwen/qwen3.7-plus
      base_url: https://openrouter.ai/api/v1
      structured_output: json_schema
      temperature: 0.4
      timeout: 120.0
      model_kwargs:
        reasoning:
          enabled: false
    vlm:
      provider: openai
      model: huihui-ai/Huihui-Qwythos-9B-Claude-Mythos-5-1M-abliterated-GGUF:Q8_0
      base_url: http://host.docker.internal:8888/v1 # Unsloth Studio on the Docker host
      structured_output: json_object
      temperature: 0.0
      timeout: 120.0
      model_kwargs:
        enable_thinking: false

embedding:
  provider: voyage
  model: voyage-multimodal-3.5
  base_url: https://api.voyageai.com/v1
  dim: 1024
  max_token_size: 8192
  input_modality: auto
  asymmetric: auto

rerank:
  enabled: true
  strategy: voyage_reranker
  model: rerank-2.5-lite
  input_modality: auto
  ## Keep the credential in .env as DLIGHTRAG_RERANK__API_KEY.

# ─────────────────────────────────────────────────────────────────
# Parser and Ingestion
# ─────────────────────────────────────────────────────────────────

working_dir: ./dlightrag_storage

extraction:
  language: English
  ## Must deactivate kg_entity_types if using entity_type_prompt_file
  # entity_type_prompt_file: domain-entities.yaml

parser_sidecars:
  vlm:
    surrounding_leading_max_tokens: 128
    surrounding_trailing_max_tokens: 128
  mineru:
    api_mode: local
    local_endpoint: http://127.0.0.1:8210
    language: ch
    auxiliary_block_policy: conservative
    ## MinerU parse engine. Unset = LightRAG default (hybrid-auto-engine, VLM-assisted).
    ## Set backend: pipeline for MinerU's non-VLM OCR engine (avoids VLM transcription
    ## artifacts on hard scans; weaker on complex layout/charts).
    ## Options: pipeline | vlm-engine | hybrid-engine | vlm-auto-engine | hybrid-auto-engine
    # backend: pipeline
    # api_mode: official
    # official_endpoint: https://mineru.net
    ## Put DLIGHTRAG_PARSER_SIDECARS__MINERU__API_TOKEN in .env.

# ─────────────────────────────────────────────────────────────────
# Product Schema
# ─────────────────────────────────────────────────────────────────

metadata:
  allow_ad_hoc_json: true
  default_ingest_policy: validate
  fields: {}
  ## Declare custom user metadata fields here only when they should become
  ## filterable. Undeclared metadata is still stored in metadata_json when
  ## allow_ad_hoc_json is true, but it is not promoted to declared filters.
  ## Example:

  # fields:
  #   department:
  #     type: string
  #     filter_ops: ["exact"]

## kg_entity_types is a lightweight hint (one line of extraction guidance).
kg_entity_types:
  - Product
  - Component
  - Technology
  - Design
  - Genre
  - Organization
  - Standard
  - Biography
  - Location
  - Event

# ─────────────────────────────────────────────────────────────────
# Deployment
# ─────────────────────────────────────────────────────────────────

workspace: default

## Docker Compose supplies local PostgreSQL defaults. Update these and Docker Compose for an external PostgreSQL endpoint. 
## postgres_ssl_mode options include disable | allow | prefer | require | verify-ca | verify-full

# postgres_host: localhost
# postgres_port: 5432
# postgres_user: dlightrag
# postgres_password: dlightrag
# postgres_database: dlightrag
# postgres_ssl_mode: require
# postgres_ssl_root_cert:

## See docs/configuration.md to tune them. Raise it only after provider rate limits 
## and PostgreSQL capacity are understood.

max_async: 8                  # LightRAG default 4
embedding_func_max_async: 16  # LightRAG default 8
embedding_batch_num: 64       # texts per embedding request (provider cap varies: Voyage<=1000, OpenAI<=2048)

# ─────────────────────────────────────────────────────────────────
# Retrieval and Answering
# ─────────────────────────────────────────────────────────────────

# top_k and chunk_top_k are LightRAG QueryParam controls (names mirror LightRAG).
# direct_visual_top_k, answer.*, and query_images.* are DlightRAG-native.
top_k: 60        # LightRAG QueryParam: KG entity/relationship breadth.
chunk_top_k: 30  # LightRAG QueryParam: chunk/BM25 candidate breadth (not a final /retrieve cap).
direct_visual_top_k: 20  # DlightRAG: image->image query-vector retrieval breadth.

answer:
  context_top_k: 30
  max_images: 8

query_images:
  max_current_images: 3
  max_upload_bytes: 15728640  # 15 MiB per durable current Web image.

web_conversations:
  max_turns: 100
  ttl_days: 30

# ─────────────────────────────────────────────────────────────────
# Security and Observability
# ─────────────────────────────────────────────────────────────────

## Auth secrets are better kept in .env.
## jwt_audience accepts one value or a list, e.g. ["api://dlightrag", "<proxy-client-id>"]

# auth_mode: simple
# api_auth_token: ""
# jwt_verification_key: ""
# jwt_jwks_url: ""
# jwt_issuer: ""
# jwt_audience: ""
# jwt_algorithm: "HS256"

## Resource authorization. Default allow_all lets any authenticated caller use
## any workspace. Switch to jwt_claims to map verified JWT claims to workspace
## and action permissions; requires auth_mode: jwt and at least one rule.

## Rule fields:
##   claim      - verified JWT claim name (on Entra, prefer App Role `roles`
##                over `groups`).
##   value      - claim value to match.
##   workspaces - exact name(s) or "*" (quote a bare *).
##   actions    - list; each item is a preset (reader|editor|admin), an exact
##                action, "workspace.*", or "*". Any match grants access, so you
##                may mix, e.g. [reader, workspace.update_metadata].
## Full reference: docs/security.md.

# access_control:
#   mode: jwt_claims
#   rules:
#     - claim: roles
#       value: finance.readers
#       workspaces: [finance]
#       actions: [reader]

## Langfuse keys (secret) belong in .env. Non-secret SDK behavior lives here.
## langfuse_host is where the app SENDS traces, set for how DlightRAG runs:
##   Dockerized app + bundled local stack -> http://host.docker.internal:3300
##   Native (non-Docker) app              -> http://localhost:3300
## Unset falls back to Langfuse Cloud. See docs/operations.md.
langfuse_host: http://host.docker.internal:3300
# langfuse_export_external_spans: false
# langfuse_trace_sensitive_data: true   # true = full detail (query, raw errors, raw IDs) for ops/dev; false = redact (privacy mode)
# langfuse_environment: production
