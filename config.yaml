#
# DlightRAG — curated application configuration
#
# This file is intentionally small. Keep high-signal product and deployment
# choices here; keep secrets in .env; keep rare tuning in docs/config-reference.md
# or pass it through environment variables when a deployment needs it.
#
# Priority: env vars > .env > config.yaml > code defaults

# ─────────────────────────────────────────────────────────────────
# Models
# ─────────────────────────────────────────────────────────────────
# LLM roles follow LightRAG role names exactly:
#   extract — entity/relationship extraction and ingest-time semantic projection
#   keyword — LightRAG retrieval keyword extraction and query planning
#   query   — answer generation
#   vlm     — image/table/equation analysis

llm:
  default:
    provider: openai
    model: google/gemini-3.5-flash
    base_url: https://openrouter.ai/api/v1
    structured_output: json_object
    temperature: 0.5
    timeout: 120.0
  roles:
    extract:
      provider: openai
      model: deepseek-v4-flash
      base_url: https://api.deepseek.com
      structured_output: json_object
      temperature: 0.0
      timeout: 120.0
      model_kwargs:
        thinking:
          type: disabled
    keyword:
      provider: openai
      model: deepseek-v4-flash
      base_url: https://api.deepseek.com
      structured_output: json_object
      temperature: 0.0
      timeout: 120.0
      model_kwargs:
        thinking:
          type: disabled
  # roles:
  #   query:
  #     provider: openai
  #     model: gpt-5.2
  #   vlm:
  #     provider: gemini
  #     model: google/gemini-3.5-flash

embedding:
  provider: voyage
  model: voyage-multimodal-3.5
  base_url: https://api.voyageai.com/v1
  dim: 1024
  max_token_size: 8192
  asymmetric: auto
  # Capability check only; does not write to LightRAG storage or PostgreSQL.
  startup_probe: true

rerank:
  enabled: true
  strategy: voyage_reranker
  model: rerank-2.5-lite
  input_modality: auto
  # voyage_reranker sends text documents to Voyage /v1/rerank.
  # Keep the credential in .env as DLIGHTRAG_RERANK__API_KEY.

# ─────────────────────────────────────────────────────────────────
# Parser and Ingestion
# ─────────────────────────────────────────────────────────────────

working_dir: ./dlightrag_storage

extraction:
  language: English
  # YAML file name under PROMPT_DIR/entity_type (default ./prompts/entity_type).
  # Must be a file name such as domain-entities.yaml, not a path.
  entity_type_prompt_file:

parser_sidecars:
  vlm:
    surrounding_leading_max_tokens: 128
    surrounding_trailing_max_tokens: 128
  mineru:
    api_mode: local
    local_endpoint: http://127.0.0.1:8210
    language: ch
    auxiliary_block_policy: conservative
    # api_mode: official
    # official_endpoint: https://mineru.net
    # Put DLIGHTRAG_PARSER_SIDECARS__MINERU__API_TOKEN in .env.

# ─────────────────────────────────────────────────────────────────
# Product Schema
# ─────────────────────────────────────────────────────────────────

metadata:
  allow_ad_hoc_json: true
  default_ingest_policy: validate
  fields: {}
  # Declare custom user metadata fields here only when they should become
  # filterable. Undeclared metadata is still stored in metadata_json when
  # allow_ad_hoc_json is true, but it is not promoted to declared filters.
  # String exact filters default to casefold_trim for stable human-entered
  # matching; set normalizer: identity only for case-sensitive identifiers.
  # Example:
  # fields:
  #   department:
  #     type: string
  #     filter_ops: ["exact"]

# Entity guidance is product-level domain shaping. For deeper domain profiles,
# prefer extraction.entity_type_prompt_file and prompts/entity_type/*.yaml.
kg_entity_types:
  - Product
  - Component
  - Technology
  - Design
  - Genre
  - Organization
  - Standard
  - Biography
  - Location
  - Event

# ─────────────────────────────────────────────────────────────────
# Deployment
# ─────────────────────────────────────────────────────────────────

workspace: default

# Docker Compose supplies local PostgreSQL defaults. Set these for an external
# PostgreSQL write endpoint. Managed replicas and reader routing belong to the
# PostgreSQL/infrastructure layer, not DlightRAG application config.
# postgres_ssl_mode options include disable | allow | prefer | require | verify-ca | verify-full

# postgres_host: localhost
# postgres_port: 5432
# postgres_user: dlightrag
# postgres_password: dlightrag
# postgres_database: dlightrag
# postgres_ssl_mode: require
# postgres_ssl_root_cert:

# High-level concurrency. Lower these for small local model endpoints; raise
# them only after provider rate limits and PostgreSQL capacity are understood.
max_async: 8
embedding_func_max_async: 16
max_parallel_insert: 3
max_parallel_parse_native: 5
max_parallel_parse_mineru: 2
max_parallel_analyze: 5

# ─────────────────────────────────────────────────────────────────
# Retrieval and Answering
# ─────────────────────────────────────────────────────────────────

top_k: 60        # LightRAG KG entity/relationship breadth.
chunk_top_k: 30  # Chunk/BM25 candidate breadth; not a final /retrieve cap.
direct_visual_top_k: 20

answer:
  context_top_k: 30
  max_images: 6

# ─────────────────────────────────────────────────────────────────
# Security and Observability
# ─────────────────────────────────────────────────────────────────

# Auth secrets are best kept in .env.
# jwt_audience accepts one value or a list, e.g. ["api://dlightrag", "<proxy-client-id>"]

# auth_mode: simple
# api_auth_token: ""
# jwt_verification_key: ""
# jwt_jwks_url: ""
# jwt_issuer: ""
# jwt_audience: ""
# jwt_algorithm: "HS256"

# Resource authorization. Default allow_all lets any authenticated caller use
# any workspace. Switch to jwt_claims to map verified JWT claims to workspace
# and action permissions; requires auth_mode: jwt and at least one rule.

# Rule fields:
#   claim      - verified JWT claim name (on Entra, prefer App Role `roles`
#                over `groups`).
#   value      - claim value to match.
#   workspaces - exact name(s) or "*" (quote a bare *).
#   actions    - list; each item is a preset (reader|editor|admin), an exact
#                action, "workspace.*", or "*". Any match grants access, so you
#                may mix, e.g. [reader, workspace.update_metadata].
# Full reference: docs/security.md.
# access_control:
#   mode: jwt_claims
#   rules:
#     - claim: roles
#       value: finance.readers
#       workspaces: [finance]
#       actions: [reader]

# Langfuse keys belong in .env. Non-secret SDK behavior can be set here when
# a deployment needs it.
# langfuse_host: http://localhost:3300
# langfuse_export_external_spans: false
# langfuse_environment: production
