# Opt-in PG18 E2E database. Builds the local image so smoke tests do not
# depend on a mutable remote :latest tag.

services:
  postgres:
    build:
      context: ./postgres
    image: dlightrag-postgres:e2e-pg18
    ports: !override
      - "${DLIGHTRAG_E2E_POSTGRES_PORT:-55432}:5432"
    volumes: !override
      - pg_e2e_data:/var/lib/postgresql
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=age,pg_textsearch"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=4"
      - "-c"
      - "max_connections=30"
      - "-c"
      - "jit=off"
      - "-c"
      - "huge_pages=off"

volumes:
  pg_e2e_data:
