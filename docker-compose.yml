# Credentials come from .env (not tracked in git).

x-common-env: &common-env
  DLIGHTRAG_POSTGRES_HOST: postgres
  DLIGHTRAG_POSTGRES_PORT: "5432"
  DLIGHTRAG_POSTGRES_DATABASE: ${DLIGHTRAG_POSTGRES_DATABASE:-dlightrag}
  DLIGHTRAG_POSTGRES_USER: ${DLIGHTRAG_POSTGRES_USER:-dlightrag}
  DLIGHTRAG_POSTGRES_PASSWORD: ${DLIGHTRAG_POSTGRES_PASSWORD:-dlightrag}
  DLIGHTRAG_WORKSPACE: ${DLIGHTRAG_WORKSPACE:-default}
  DLIGHTRAG_WORKING_DIR: /app/dlightrag_storage

services:
  dlightrag-api:
    restart: unless-stopped
    build: .
    ports:
      - "8100:8100"
    environment:
      <<: *common-env
      DLIGHTRAG_API_HOST: "0.0.0.0"
      DLIGHTRAG_API_PORT: "8100"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - dlightrag_data:/app/dlightrag_storage
      - ./src:/app/src:ro
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["dlightrag-api"]

  dlightrag-mcp:
    restart: unless-stopped
    build: .
    ports:
      - "8101:8101"
    environment:
      <<: *common-env
      DLIGHTRAG_MCP_TRANSPORT: streamable-http
      DLIGHTRAG_MCP_HOST: "0.0.0.0"
      DLIGHTRAG_MCP_PORT: "8101"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - dlightrag_data:/app/dlightrag_storage
      - ./src:/app/src:ro
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["dlightrag-mcp"]

  postgres:
    restart: unless-stopped
    image: ghcr.io/hanlianlu/dlightrag-postgres:latest
    # build: postgres/  # uncomment to build the image locally
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DLIGHTRAG_POSTGRES_DATABASE:-dlightrag}
      POSTGRES_USER: ${DLIGHTRAG_POSTGRES_USER:-dlightrag}
      POSTGRES_PASSWORD: ${DLIGHTRAG_POSTGRES_PASSWORD:-dlightrag}
    volumes:
      - pg_data:/var/lib/postgresql/data
    command:
      - "postgres"
      # AGE extension requires preloading
      - "-c"
      - "shared_preload_libraries=age"
      # Memory
      - "-c"
      - "shared_buffers=6GB"
      - "-c"
      - "work_mem=256MB"
      - "-c"
      - "maintenance_work_mem=2GB"
      - "-c"
      - "effective_cache_size=16GB"
      # SSD / IO
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      # WAL
      - "-c"
      - "wal_buffers=16MB"
      # Parallelism
      - "-c"
      - "max_parallel_workers_per_gather=4"
      # Docker
      - "-c"
      - "huge_pages=off"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DLIGHTRAG_POSTGRES_USER:-dlightrag} -d ${DLIGHTRAG_POSTGRES_DATABASE:-dlightrag}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dlightrag_data:
  pg_data:
