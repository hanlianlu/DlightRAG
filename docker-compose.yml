# Credentials come from .env (not tracked in git).

x-common-env: &common-env
  DLIGHTRAG_POSTGRES_HOST: postgres
  DLIGHTRAG_POSTGRES_PORT: "5432"
  DLIGHTRAG_POSTGRES_DATABASE: ${DLIGHTRAG_POSTGRES_DATABASE:-dlightrag}
  DLIGHTRAG_POSTGRES_USER: ${DLIGHTRAG_POSTGRES_USER:-dlightrag}
  DLIGHTRAG_POSTGRES_PASSWORD: ${DLIGHTRAG_POSTGRES_PASSWORD:-dlightrag}
  DLIGHTRAG_WORKSPACE: ${DLIGHTRAG_WORKSPACE:-default}
  DLIGHTRAG_WORKING_DIR: /app/dlightrag_storage
  # config.yaml defaults to a native host MinerU sidecar at 127.0.0.1:8210.
  # Inside a DlightRAG container, 127.0.0.1 is the app container itself, so
  # route that externally managed sidecar through Docker's host alias unless
  # explicitly overridden.
  MINERU_LOCAL_ENDPOINT: ${MINERU_DOCKER_LOCAL_ENDPOINT:-http://host.docker.internal:8210}
  # OFFICIAL_ENDPOINT: https://mineru.net

x-app-image: &app-image dlightrag:local
x-app-build: &app-build
  context: .

services:
  dlightrag-api:
    restart: unless-stopped
    image: *app-image
    build: *app-build
    ports:
      - "127.0.0.1:8100:8100"
    environment:
      <<: *common-env
      DLIGHTRAG_API_HOST: "0.0.0.0"
      DLIGHTRAG_API_PORT: "8100"
      # The container binds 0.0.0.0, but the port above is published to
      # 127.0.0.1 only, so no-auth is acceptable for local dev. Set
      # DLIGHTRAG_AUTH_MODE=simple + DLIGHTRAG_API_AUTH_TOKEN (and drop this
      # override) before publishing the port on a non-loopback address.
      DLIGHTRAG_ALLOW_INSECURE_NO_AUTH: "true"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - dlightrag_data:/app/dlightrag_storage
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["dlightrag-api"]

  dlightrag-mcp:
    restart: unless-stopped
    image: *app-image
    build: *app-build
    # SECURITY: MCP streamable-http exposes ingest / delete_files / answer.
    # This maps the host port to 127.0.0.1 only; set DLIGHTRAG_AUTH_MODE=simple
    # + DLIGHTRAG_API_AUTH_TOKEN before exposing it on a non-loopback network.
    ports:
      - "127.0.0.1:8101:8101"
    environment:
      <<: *common-env
      DLIGHTRAG_MCP_TRANSPORT: streamable-http
      DLIGHTRAG_MCP_HOST: "0.0.0.0"
      DLIGHTRAG_MCP_PORT: "8101"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - dlightrag_data:/app/dlightrag_storage
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["dlightrag-mcp"]

  lightrag-gui:
    restart: unless-stopped
    image: *app-image
    build: *app-build
    ports:
      - "127.0.0.1:9621:9621"
    environment:
      # PostgreSQL — same instance as DlightRAG (read-only, no conflict)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${DLIGHTRAG_POSTGRES_USER:-dlightrag}
      POSTGRES_PASSWORD: ${DLIGHTRAG_POSTGRES_PASSWORD:-dlightrag}
      POSTGRES_DATABASE: ${DLIGHTRAG_POSTGRES_DATABASE:-dlightrag}
      # Storage backends — must match DlightRAG exactly
      LIGHTRAG_GRAPH_STORAGE: PGGraphStorage
      LIGHTRAG_VECTOR_STORAGE: PGVectorStorage
      LIGHTRAG_KV_STORAGE: PGKVStorage
      LIGHTRAG_DOC_STATUS_STORAGE: PGDocStatusStorage
      # Workspace — same as DlightRAG to see the same graph
      WORKSPACE: ${DLIGHTRAG_WORKSPACE:-default}
      # LLM — OpenRouter (initialization only; graph browsing never calls it)
      LLM_BINDING: openai
      LLM_BINDING_HOST: https://openrouter.ai/api/v1
      LLM_BINDING_API_KEY: ${DLIGHTRAG_LLM__DEFAULT__API_KEY}
      LLM_MODEL: google/gemini-2.5-flash
      # Embedding — OpenRouter (initialization only)
      EMBEDDING_BINDING: openai
      EMBEDDING_BINDING_HOST: https://openrouter.ai/api/v1
      EMBEDDING_BINDING_API_KEY: ${DLIGHTRAG_LLM__DEFAULT__API_KEY}
      EMBEDDING_MODEL: openai/text-embedding-3-small
      # Server
      HOST: "0.0.0.0"
      PORT: "9621"
      WORKING_DIR: /tmp/lightrag_gui
      INPUT_DIR: /tmp/lightrag_gui/inputs
      LOG_DIR: /tmp
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["lightrag-server"]

  postgres:
    restart: unless-stopped
    image: dlightrag-postgres:pg18
    build:
      context: postgres
    shm_size: ${DLIGHTRAG_POSTGRES_SHM_SIZE:-8gb}
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${DLIGHTRAG_POSTGRES_DATABASE:-dlightrag}
      POSTGRES_USER: ${DLIGHTRAG_POSTGRES_USER:-dlightrag}
      POSTGRES_PASSWORD: ${DLIGHTRAG_POSTGRES_PASSWORD:-dlightrag}
    volumes:
      - pg18_data:/var/lib/postgresql
    command:
      - "postgres"
      # AGE, pg_textsearch, and pg_jieba require preloading
      - "-c"
      - "shared_preload_libraries=age,pg_textsearch,pg_jieba"
      # Memory
      - "-c"
      - "shared_buffers=${DLIGHTRAG_POSTGRES_SHARED_BUFFERS:-8GB}"
      - "-c"
      - "work_mem=${DLIGHTRAG_POSTGRES_WORK_MEM:-256MB}"
      - "-c"
      - "maintenance_work_mem=${DLIGHTRAG_POSTGRES_MAINTENANCE_WORK_MEM:-2GB}"
      - "-c"
      - "effective_cache_size=${DLIGHTRAG_POSTGRES_EFFECTIVE_CACHE_SIZE:-18GB}"
      # SSD / IO
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      # WAL
      - "-c"
      - "wal_buffers=16MB"
      # Parallelism
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_maintenance_workers=4"
      # Connections
      - "-c"
      - "max_connections=${DLIGHTRAG_POSTGRES_MAX_CONNECTIONS:-80}"
      # Disable JIT (no benefit for vector/JSONB workloads, saves compilation overhead)
      - "-c"
      - "jit=off"
      # Docker
      - "-c"
      - "huge_pages=off"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DLIGHTRAG_POSTGRES_USER:-dlightrag} -d ${DLIGHTRAG_POSTGRES_DATABASE:-dlightrag}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dlightrag_data:
  pg18_data:
