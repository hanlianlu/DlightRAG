# Credentials come from .env (not tracked in git).

x-common-env: &common-env
  DLIGHTRAG_POSTGRES_HOST: postgres
  DLIGHTRAG_POSTGRES_PORT: "5432"
  DLIGHTRAG_POSTGRES_DATABASE: ${DLIGHTRAG_POSTGRES_DATABASE:-dlightrag}
  DLIGHTRAG_POSTGRES_USER: ${DLIGHTRAG_POSTGRES_USER:-dlightrag}
  DLIGHTRAG_POSTGRES_PASSWORD: ${DLIGHTRAG_POSTGRES_PASSWORD:-dlightrag}
  DLIGHTRAG_WORKSPACE: ${DLIGHTRAG_WORKSPACE:-default}
  DLIGHTRAG_WORKING_DIR: /app/dlightrag_storage
  # .env defaults to a native host sidecar at 127.0.0.1:8210. Inside a
  # DlightRAG container, 127.0.0.1 is the app container itself, so route local
  # MinerU through Docker's host alias unless explicitly overridden.
  MINERU_LOCAL_ENDPOINT: ${MINERU_DOCKER_LOCAL_ENDPOINT:-http://host.docker.internal:8210}

services:
  dlightrag-api:
    restart: unless-stopped
    build: .
    ports:
      - "8100:8100"
    environment:
      <<: *common-env
      DLIGHTRAG_API_HOST: "0.0.0.0"
      DLIGHTRAG_API_PORT: "8100"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - dlightrag_data:/app/dlightrag_storage
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["dlightrag-api"]

  dlightrag-mcp:
    restart: unless-stopped
    build: .
    # SECURITY: MCP streamable-http exposes ingest / delete_files / answer.
    # This maps the host port to 127.0.0.1 only; set DLIGHTRAG_AUTH_MODE=simple
    # + DLIGHTRAG_API_AUTH_TOKEN before exposing it on a non-loopback network.
    ports:
      - "127.0.0.1:8101:8101"
    environment:
      <<: *common-env
      DLIGHTRAG_MCP_TRANSPORT: streamable-http
      DLIGHTRAG_MCP_HOST: "0.0.0.0"
      DLIGHTRAG_MCP_PORT: "8101"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - dlightrag_data:/app/dlightrag_storage
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["dlightrag-mcp"]

  postgres:
    restart: unless-stopped
    image: dlightrag-postgres:pg18
    build:
      context: postgres
    shm_size: 8gb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DLIGHTRAG_POSTGRES_DATABASE:-dlightrag}
      POSTGRES_USER: ${DLIGHTRAG_POSTGRES_USER:-dlightrag}
      POSTGRES_PASSWORD: ${DLIGHTRAG_POSTGRES_PASSWORD:-dlightrag}
    volumes:
      - pg_data:/var/lib/postgresql
    command:
      - "postgres"
      # AGE and pg_textsearch require preloading
      - "-c"
      - "shared_preload_libraries=age,pg_textsearch"
      # Memory
      - "-c"
      - "shared_buffers=8GB"
      - "-c"
      - "work_mem=256MB"
      - "-c"
      - "maintenance_work_mem=2GB"
      - "-c"
      - "effective_cache_size=18GB"
      # SSD / IO
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      # WAL / optional local read replica
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_slot_wal_keep_size=4GB"
      # Parallelism
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_maintenance_workers=4"
      # Connections
      - "-c"
      - "max_connections=50"
      # Disable JIT (no benefit for vector/JSONB workloads, saves compilation overhead)
      - "-c"
      - "jit=off"
      # Docker
      - "-c"
      - "huge_pages=off"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DLIGHTRAG_POSTGRES_USER:-dlightrag} -d ${DLIGHTRAG_POSTGRES_DATABASE:-dlightrag}"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-replica:
    profiles: ["replica"]
    restart: unless-stopped
    image: dlightrag-postgres:pg18
    build:
      context: postgres
    shm_size: 8gb
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DLIGHTRAG_POSTGRES_DATABASE:-dlightrag}
      POSTGRES_USER: ${DLIGHTRAG_POSTGRES_USER:-dlightrag}
      POSTGRES_PASSWORD: ${DLIGHTRAG_POSTGRES_PASSWORD:-dlightrag}
      POSTGRES_PRIMARY_HOST: postgres
      POSTGRES_PRIMARY_PORT: "5432"
      POSTGRES_REPLICATION_USER: ${DLIGHTRAG_POSTGRES_REPLICATION_USER:-replicator}
      POSTGRES_REPLICATION_PASSWORD: ${DLIGHTRAG_POSTGRES_REPLICATION_PASSWORD:-dlightrag-replica}
      POSTGRES_REPLICATION_SLOT: ${DLIGHTRAG_POSTGRES_REPLICATION_SLOT:-dlightrag_replica}
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
      - ./scripts/postgres/replica-entrypoint.sh:/usr/local/bin/dlightrag-postgres-replica-entrypoint.sh:ro
    entrypoint: ["dlightrag-postgres-replica-entrypoint.sh"]
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=age,pg_textsearch"
      - "-c"
      - "hot_standby=on"
      - "-c"
      - "hot_standby_feedback=off"
      - "-c"
      - "max_standby_streaming_delay=30s"
      - "-c"
      - "jit=off"
      - "-c"
      - "huge_pages=off"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DLIGHTRAG_POSTGRES_USER:-dlightrag} -d ${DLIGHTRAG_POSTGRES_DATABASE:-dlightrag}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  dlightrag_data:
  pg_data:
  pg_replica_data:
