name: DlightRAG CodeQL

queries:
  # security-extended = security queries only. Code-quality/maintainability
  # rules (the security-and-quality superset) are already enforced by ruff +
  # pyright in CI, so enabling them here only produced note-level duplicates.
  - uses: security-extended

query-filters:
  - exclude:
      id: actions/unnecessary-use-of-advanced-config

paths:
  - .github/workflows
  - src
  - frontend
  - scripts

paths-ignore:
  - src/dlightrag/web/static/generated/**
  - src/dlightrag/web/static/vendor/**
  - frontend/node_modules/**
  - dist/**
  - output/**
