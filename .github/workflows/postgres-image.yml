name: Publish Postgres Image

on:
  push:
    branches: [main]
    paths:
      - 'postgres/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: postgres/
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dlightrag-postgres:latest
