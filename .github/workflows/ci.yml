name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --group dev
      - run: uv run ruff check src/ tests/ scripts/
      - run: uv run ruff format --check src/ tests/ scripts/
      - run: uv run pyright src/
      - run: uv run lint-imports
      - run: uv run pytest tests/unit -q --tb=short

  integration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: dlightrag
          POSTGRES_USER: dlightrag
          POSTGRES_PASSWORD: dlightrag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dlightrag -d dlightrag"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --group dev
      - run: uv run pytest tests/integration -q --tb=short
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: dlightrag
          PGPASSWORD: dlightrag
          PGDATABASE: dlightrag
