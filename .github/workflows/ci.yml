name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.14"
      - uses: actions/setup-node@v7
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: uv sync --group dev
      - run: uv run ruff check src/ tests/ scripts/ prerequisite_setup.py
      - run: uv run ruff check src/ scripts/ prerequisite_setup.py --select S
      - run: uv run ruff format --check src/ tests/ scripts/ prerequisite_setup.py
      - run: uv run pyright
      - run: uv run lint-imports
      - run: uv run shellcheck $(git ls-files '*.sh')
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend run typecheck
      - run: npm --prefix frontend run lint:css
      - run: npm --prefix frontend run build
      - run: npm --prefix frontend audit --omit=dev
      - run: uv run pytest tests/unit -q --tb=short

  integration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ghcr.io/${{ github.repository_owner }}/dlightrag-postgres:pg18
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          POSTGRES_DB: dlightrag
          POSTGRES_USER: dlightrag
          POSTGRES_PASSWORD: dlightrag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dlightrag -d dlightrag"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --group dev
      - run: uv run pytest tests/integration -q --tb=short
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: dlightrag
          PGPASSWORD: dlightrag
          PGDATABASE: dlightrag
