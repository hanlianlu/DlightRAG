name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Lint: ruff check + format (~20s)
  # ------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: '3.12'
      - run: uv sync --group dev
      - run: uv run ruff check src/ tests/ scripts/
      - run: uv run ruff format --check src/ tests/ scripts/

  # ------------------------------------------------------------------
  # Type check: pyright (~30s)
  # ------------------------------------------------------------------
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: '3.12'
      - run: uv sync --group dev
      - run: uv run pyright src/

  # ------------------------------------------------------------------
  # Architecture: import-linter boundary enforcement (~10s)
  # ------------------------------------------------------------------
  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: '3.12'
      - run: uv sync --group dev
      - run: uv run lint-imports

  # ------------------------------------------------------------------
  # Unit tests: no external deps (~60s)
  # ------------------------------------------------------------------
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: '3.12'
      - run: uv sync --group dev
      - run: uv run pytest tests/unit -v --tb=short

  # ------------------------------------------------------------------
  # Integration tests: PostgreSQL service container (~90s)
  # ------------------------------------------------------------------
  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: dlightrag
          POSTGRES_USER: dlightrag
          POSTGRES_PASSWORD: dlightrag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dlightrag -d dlightrag"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: '3.12'
      - run: uv sync --group dev
      - run: uv run pytest tests/integration -v --tb=short
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: dlightrag
          PGPASSWORD: dlightrag
          PGDATABASE: dlightrag
